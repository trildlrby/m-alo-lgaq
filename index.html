<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Horizon" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#F2EDE1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Horizon — Five Year Plan</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23F2EDE1'/%3E%3Ccircle cx='90' cy='90' r='55' fill='none' stroke='%23C25A2E' stroke-width='6'/%3E%3Ccircle cx='90' cy='90' r='8' fill='%23C25A2E'/%3E%3C/svg%3E" />
  <script>
    // Apply theme before paint to prevent flash
    (function() {
      try {
        var pref = localStorage.getItem('horizon_theme_pref') || 'system';
        var resolved = pref;
        if (pref === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolved);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', resolved === 'dark' ? '#1A1814' : '#F2EDE1');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter+Tight:wght@400;500;600&display=swap');

    /* ===== THEME VARIABLES ===== */
    :root, [data-theme="light"] {
      --bg: #F2EDE1;
      --surface: #FBF7EC;
      --surface-2: #E8E2D0;
      --border: #D9D0BC;
      --text: #2A2720;
      --text-muted: #8A7F6A;
      --accent: #C25A2E;
      --accent-fg: #F2EDE1;
      --accent-soft-bg: #F5E4D6;
      --positive: #5A7A3E;
      --positive-bg: #EDF0E3;
      --negative: #A64A2E;
      --negative-bg: #F3E5E0;
      --neutral: #8B6F2E;
      --neutral-bg: #F0E8D0;
      --vision-bg: #2A2720;
      --vision-text: #F2EDE1;
      --vision-accent: #E8A87C;
      --btn-primary-bg: #2A2720;
      --btn-primary-text: #F2EDE1;
      --modal-overlay: rgba(42,39,32,0.5);
      --grain-dot: rgba(0,0,0,0.025);
      --shadow-color: rgba(42,39,32,0.06);
    }

    [data-theme="dark"] {
      --bg: #1A1814;
      --surface: #25211B;
      --surface-2: #33302A;
      --border: #3A342A;
      --text: #EAE3D0;
      --text-muted: #8E8572;
      --accent: #E07B47;
      --accent-fg: #1A1814;
      --accent-soft-bg: #3D2E24;
      --positive: #A8C488;
      --positive-bg: #2A3226;
      --negative: #D67E5E;
      --negative-bg: #3A2925;
      --neutral: #C9A76A;
      --neutral-bg: #332B1E;
      --vision-bg: #EAE3D0;
      --vision-text: #1A1814;
      --vision-accent: #C25A2E;
      --btn-primary-bg: #EAE3D0;
      --btn-primary-text: #1A1814;
      --modal-overlay: rgba(0,0,0,0.65);
      --grain-dot: rgba(255,255,255,0.025);
      --shadow-color: rgba(0,0,0,0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      transition: background-color 0.25s ease, color 0.25s ease;
    }
    button, input, textarea, select { font-family: inherit; color: inherit; }
    button { background: none; border: none; cursor: pointer; padding: 0; }
    input, textarea, select { outline: none; }
    textarea { resize: none; }
    .font-display { font-family: 'Fraunces', Georgia, serif; }
    .grain { background-image: radial-gradient(var(--grain-dot) 1px, transparent 1px); background-size: 3px 3px; }

    /* Utility classes */
    .app-root { min-height: 100vh; min-height: 100dvh; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
    .container { padding: 0 20px; }

    /* Header */
    .header { padding: 32px 20px 16px; display: flex; justify-content: space-between; align-items: flex-start; }
    .header-eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .header-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .header-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
    .header-title { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 500; letter-spacing: -0.02em; margin: 0; line-height: 1; color: var(--text); }
    .header-arrow { color: var(--text-muted); }
    .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface-2); color: var(--text); display: flex; align-items: center; justify-content: center; margin-top: 4px; flex-shrink: 0; }

    /* Vision card */
    .vision-card { width: 100%; text-align: left; padding: 24px; border-radius: 20px; background: var(--vision-bg); color: var(--vision-text); position: relative; transition: transform 0.15s, background-color 0.25s, color 0.25s; }
    .vision-card:active { transform: scale(0.99); }
    .vision-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .vision-card-badge { display: flex; align-items: center; gap: 8px; color: var(--vision-accent); font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; }
    .vision-text { font-family: 'Fraunces', serif; font-size: 20px; line-height: 1.35; letter-spacing: -0.01em; margin: 0; }
    .vision-placeholder { color: var(--text-muted); font-style: italic; }

    /* Generic card */
    .card { padding: 20px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--text); transition: background-color 0.25s, border-color 0.25s; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .card-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .stat-box { padding: 12px; border-radius: 14px; }
    .stat-box.positive { background: var(--positive-bg); }
    .stat-box.negative { background: var(--negative-bg); }
    .stat-box-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .stat-box-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .stat-box-value { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; margin: 0; line-height: 1; }
    .stat-box.positive .stat-box-label, .stat-box.positive .stat-box-value { color: var(--positive); }
    .stat-box.negative .stat-box-label, .stat-box.negative .stat-box-value { color: var(--negative); }

    .link-btn { margin-top: 12px; font-size: 12px; color: var(--accent); display: inline-flex; align-items: center; gap: 4px; }

    /* CTA button */
    .cta-btn { width: 100%; padding: 20px; border-radius: 20px; background: var(--accent); color: var(--accent-fg); display: flex; align-items: center; justify-content: space-between; text-align: left; transition: transform 0.15s, background-color 0.25s; }
    .cta-btn:active { transform: scale(0.99); }
    .cta-btn-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.8; }
    .cta-btn-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin: 2px 0 0; }
    .cta-btn-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }

    /* Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); transition: background-color 0.25s, border-color 0.25s; }
    .nav-btn { flex: 1; padding: 12px 0; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); }
    .nav-btn.active { color: var(--accent); }
    .nav-btn-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
    .nav-btn.active .nav-btn-label { font-weight: 600; }

    /* Trajectory */
    .traj-row { display: flex; align-items: center; gap: 12px; }
    .traj-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .traj-label { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500; margin: 0; }
    .traj-sublabel { font-size: 12px; color: var(--text-muted); margin: 2px 0 0; }

    /* Milestones */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin: 0 4px 12px; }
    .section-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin: 0; color: var(--text); }
    .add-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--accent-fg); display: flex; align-items: center; justify-content: center; }
    .year-header { display: flex; align-items: center; gap: 12px; margin: 0 4px 8px; }
    .year-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .year-label { font-family: 'Fraunces', serif; font-size: 14px; letter-spacing: 0.05em; color: var(--accent); font-weight: 600; }
    .year-line { flex: 1; height: 1px; background: var(--border); }
    .milestone-row { padding: 16px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; color: var(--text); }
    .ms-checkbox { margin-top: 2px; flex-shrink: 0; }
    .ms-checkbox-filled { width: 20px; height: 20px; border-radius: 50%; background: var(--positive); display: flex; align-items: center; justify-content: center; }
    .ms-checkbox-empty { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--text-muted); }
    .ms-text { flex: 1; font-size: 14px; line-height: 1.35; margin: 0; }
    .ms-text.done { text-decoration: line-through; color: var(--text-muted); }
    .ms-delete { flex-shrink: 0; opacity: 0.4; padding: 4px; color: var(--text); }

    /* Empty state */
    .empty { padding: 32px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); text-align: center; }
    .empty-icon { margin: 0 auto 12px; color: var(--text-muted); }
    .empty-title { font-family: 'Fraunces', serif; font-style: italic; margin: 0 0 4px; color: var(--text); }
    .empty-sub { font-size: 12px; color: var(--text-muted); margin: 0; }

    /* History rows */
    .history-row { width: 100%; padding: 16px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; gap: 12px; text-align: left; margin-bottom: 8px; transition: transform 0.15s, background-color 0.25s; }
    .history-row:active { transform: scale(0.99); }
    .traj-dot-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .history-row-content { flex: 1; min-width: 0; }
    .history-row-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500; margin: 0; }
    .history-row-meta { font-size: 12px; color: var(--text-muted); margin: 2px 0 0; }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; z-index: 50; background: var(--modal-overlay); display: flex; align-items: flex-end; justify-content: center; }
    .modal { width: 100%; max-height: 92vh; overflow-y: auto; background: var(--bg); border-radius: 24px 24px 0 0; color: var(--text); }
    @media (min-width: 640px) {
      .modal-backdrop { align-items: center; }
      .modal { max-width: 440px; border-radius: 24px; }
    }
    .modal-header { position: sticky; top: 0; background: var(--bg); display: flex; justify-content: space-between; padding: 20px 20px 12px; }
    .modal-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin: 0; letter-spacing: -0.01em; color: var(--text); }
    .modal-subtitle { font-size: 12px; color: var(--text-muted); margin: 2px 0 0; }
    .modal-body { padding: 0 20px 24px; }

    /* Form controls */
    .form-input, .form-textarea, .form-select { width: 100%; padding: 12px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 14px; }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
    .form-textarea.display { font-family: 'Fraunces', serif; font-size: 18px; padding: 16px; line-height: 1.35; }
    .form-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .year-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .year-chip { padding: 8px 14px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 14px; }
    .year-chip.selected { background: var(--btn-primary-bg); color: var(--btn-primary-text); border-color: var(--btn-primary-bg); }
    .btn-primary { width: 100%; padding: 14px; border-radius: 12px; background: var(--btn-primary-bg); color: var(--btn-primary-text); font-weight: 500; }
    .btn-primary:disabled { opacity: 0.4; }
    .btn-accent { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent); color: var(--accent-fg); font-weight: 500; }
    .btn-danger-ghost { width: 100%; padding: 12px; border-radius: 12px; color: var(--negative); background: var(--negative-bg); font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-text { width: 100%; padding: 12px; font-size: 14px; color: var(--text-muted); text-align: center; }

    /* Trajectory selector */
    .traj-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .traj-option { padding: 12px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .traj-option.selected { border-width: 2px; }
    .traj-option-label { font-size: 12px; }

    /* List editor */
    .list-item { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; margin-bottom: 6px; }
    .list-item-text { flex: 1; font-size: 14px; color: var(--text); }
    .list-item-remove { opacity: 0.5; padding: 4px; color: var(--text); }
    .list-add-row { display: flex; gap: 8px; }
    .list-add-input { flex: 1; padding: 10px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 14px; }
    .list-add-btn { padding: 0 12px; border-radius: 8px; color: var(--accent-fg); }

    /* Password lock screen */
    .pin-screen { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; background: var(--bg); color: var(--text); }
    .pin-heading { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 500; text-align: center; margin: 0 0 8px; letter-spacing: -0.01em; color: var(--text); }
    .pin-sub { font-size: 14px; color: var(--text-muted); text-align: center; margin: 0 0 40px; max-width: 400px; }
    .pin-footer { margin-top: 32px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .pin-footer button { color: var(--accent); text-decoration: underline; }

    /* Display lists */
    .display-list-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; font-weight: 600; margin-bottom: 8px; }
    .display-list-item { padding: 12px; border-radius: 8px; font-size: 14px; color: var(--text); margin-bottom: 6px; }

    /* Reflection */
    .reflection { font-family: 'Fraunces', serif; font-style: italic; line-height: 1.6; padding: 16px; border-radius: 12px; background: var(--surface); color: var(--text); margin: 0; }

    /* Theme picker (settings) */
    .theme-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .theme-option { padding: 14px 8px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); display: flex; flex-direction: column; align-items: center; gap: 6px; transition: background-color 0.15s; }
    .theme-option.selected { border-width: 2px; border-color: var(--accent); background: var(--accent-soft-bg); }
    .theme-option-label { font-size: 12px; font-weight: 500; }

    /* Utility */
    .space-y-5 > * + * { margin-top: 20px; }
    .space-y-4 > * + * { margin-top: 16px; }
    .space-y-3 > * + * { margin-top: 12px; }
    .space-y-2 > * + * { margin-top: 8px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mt-3 { margin-top: 12px; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .mono { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>

    function Icon({ name, size = 16, color = 'currentColor', strokeWidth = 2, style = {} }) {
      return h('svg', {
        xmlns: 'http://www.w3.org/2000/svg',
        width: size, height: size,
        viewBox: '0 0 24 24',
        fill: 'none',
        stroke: color,
        'stroke-width': strokeWidth,
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round',
        style,
        dangerouslySetInnerHTML: { __html: ICON_PATHS[name] || '' }
      });
    }

    // ----- Theme palettes (for JS-side color references) -----
    const PALETTES = {
      light: {
        accent: '#C25A2E',
        accentFg: '#F2EDE1',
        positive: '#5A7A3E',
        positiveBg: '#EDF0E3',
        negative: '#A64A2E',
        negativeBg: '#F3E5E0',
        neutral: '#8B6F2E',
        neutralBg: '#F0E8D0',
        text: '#2A2720',
        textMuted: '#8A7F6A',
        surface: '#FBF7EC',
        surface2: '#E8E2D0',
        border: '#D9D0BC',
        visionAccent: '#E8A87C',
        accentSoftBg: '#F5E4D6'
      },
      dark: {
        accent: '#E07B47',
        accentFg: '#1A1814',
        positive: '#A8C488',
        positiveBg: '#2A3226',
        negative: '#D67E5E',
        negativeBg: '#3A2925',
        neutral: '#C9A76A',
        neutralBg: '#332B1E',
        text: '#EAE3D0',
        textMuted: '#8E8572',
        surface: '#25211B',
        surface2: '#33302A',
        border: '#3A342A',
        visionAccent: '#C25A2E',
        accentSoftBg: '#3D2E24'
      }
    };

    const THEME_PREF_KEY = 'horizon_theme_pref';

    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function resolveTheme(pref) {
      return pref === 'system' ? getSystemTheme() : pref;
    }

    function applyTheme(pref) {
      const resolved = resolveTheme(pref);
      document.documentElement.setAttribute('data-theme', resolved);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', resolved === 'dark' ? '#1A1814' : '#F2EDE1');
      try { localStorage.setItem(THEME_PREF_KEY, pref); } catch {}
    }

    function loadThemePref() {
      try { return localStorage.getItem(THEME_PREF_KEY) || 'system'; } catch { return 'system'; }
    }

    // Preact context for passing resolved palette to components
    const ThemeContext = preact.createContext({ resolved: 'light', palette: PALETTES.light });
    const useTheme = () => preactHooks.useContext(ThemeContext);

    // ----- Crypto helpers -----
    const VAULT_KEY = 'horizon_vault_v2';
    const PBKDF2_ITERATIONS = 310000;

    function bufToB64(buf) {
      const bytes = buf instanceof ArrayBuffer ? new Uint8Array(buf) : buf;
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    function b64ToBuf(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    async function deriveKey(password, saltBuf) {
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: saltBuf, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encryptJSON(key, obj) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoded = new TextEncoder().encode(JSON.stringify(obj));
      const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
      return { iv: bufToB64(iv.buffer), ciphertext: bufToB64(ciphertext) };
    }

    async function decryptJSON(key, ivB64, ctB64) {
      const plaintext = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: b64ToBuf(ivB64) },
        key,
        b64ToBuf(ctB64)
      );
      return JSON.parse(new TextDecoder().decode(plaintext));
    }

    function loadVault() {
      try {
        const raw = localStorage.getItem(VAULT_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function saveVault(v) {
      localStorage.setItem(VAULT_KEY, JSON.stringify(v));
    }

    function defaultData() {
      const y = new Date().getFullYear();
      return {
        vision: { text: '', startYear: y, targetYear: y + 5 },
        milestones: [],
        checkins: [],
        settings: { theme: 'system' }
      };
    }

    function migrateData(data) {
      // Ensure settings object exists for older exports
      if (!data.settings) data.settings = { theme: 'system' };
      if (!data.settings.theme) data.settings.theme = 'system';
      return data;
    }

    async function setupNewVault(password) {
      const saltBytes = crypto.getRandomValues(new Uint8Array(16));
      const key = await deriveKey(password, saltBytes.buffer);
      const initialData = defaultData();
      const { iv, ciphertext } = await encryptJSON(key, initialData);
      saveVault({ salt: bufToB64(saltBytes.buffer), iv, ciphertext });
      return { key, data: initialData };
    }

    async function unlockVault(password) {
      const vault = loadVault();
      if (!vault) return null;
      const key = await deriveKey(password, b64ToBuf(vault.salt));
      try {
        const data = migrateData(await decryptJSON(key, vault.iv, vault.ciphertext));
        return { key, data };
      } catch {
        return null;
      }
    }

    async function encryptAndSave(key, data) {
      const vault = loadVault();
      if (!vault) return;
      const { iv, ciphertext } = await encryptJSON(key, data);
      saveVault({ salt: vault.salt, iv, ciphertext });
    }

    async function rekeyVault(newPassword, currentData) {
      const saltBytes = crypto.getRandomValues(new Uint8Array(16));
      const newKey = await deriveKey(newPassword, saltBytes.buffer);
      const { iv, ciphertext } = await encryptJSON(newKey, currentData);
      saveVault({ salt: bufToB64(saltBytes.buffer), iv, ciphertext });
      return newKey;
    }

    // ----- Main App -----
    function App() {
      const [authState, setAuthState] = useState('loading'); // loading | setup | locked | unlocked
      const [cryptoKey, setCryptoKey] = useState(null);
      const [data, setData] = useState(null);
      const [tab, setTab] = useState('home');
      const [modal, setModal] = useState(null);
      const [viewingId, setViewingId] = useState(null);
      const [themePref, setThemePref] = useState(() => loadThemePref());
      const [resolvedTheme, setResolvedTheme] = useState(() => resolveTheme(loadThemePref()));

      // Listen for system theme changes when pref is "system"
      useEffect(() => {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const handler = () => {
          if (themePref === 'system') {
            const r = getSystemTheme();
            setResolvedTheme(r);
            applyTheme('system');
          }
        };
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, [themePref]);

      // Apply theme any time pref changes
      useEffect(() => {
        applyTheme(themePref);
        setResolvedTheme(resolveTheme(themePref));
      }, [themePref]);

      useEffect(() => {
        const vault = loadVault();
        setAuthState(vault ? 'locked' : 'setup');
      }, []);

      const handleSetup = async (password) => {
        const { key, data } = await setupNewVault(password);
        // Carry over any existing theme preference into the new vault
        data.settings = data.settings || { theme: themePref };
        data.settings.theme = themePref;
        await encryptAndSave(key, data);
        setCryptoKey(key);
        setData(data);
        setAuthState('unlocked');
      };

      const handleUnlock = async (password) => {
        const result = await unlockVault(password);
        if (!result) return false;
        setCryptoKey(result.key);
        setData(result.data);
        // Apply the stored theme preference from the vault
        const storedPref = (result.data.settings && result.data.settings.theme) || 'system';
        setThemePref(storedPref);
        setAuthState('unlocked');
        return true;
      };

      const updateData = async (newData) => {
        setData(newData);
        try {
          if (cryptoKey) await encryptAndSave(cryptoKey, newData);
        } catch (e) { console.error('Save failed:', e); }
      };

      const updateTheme = (newPref) => {
        setThemePref(newPref);
        if (data) {
          updateData({ ...data, settings: { ...(data.settings || {}), theme: newPref } });
        }
      };

      const handleChangePassword = async (currentPassword, newPassword) => {
        const verify = await unlockVault(currentPassword);
        if (!verify) return 'WRONG_CURRENT';
        const newKey = await rekeyVault(newPassword, data);
        setCryptoKey(newKey);
        return 'OK';
      };

      const wipeAll = () => {
        localStorage.removeItem(VAULT_KEY);
        setCryptoKey(null);
        setData(null);
        setAuthState('setup');
      };

      if (authState === 'loading') return null;

      const themeValue = { resolved: resolvedTheme, palette: PALETTES[resolvedTheme] };

      if (authState === 'setup') return html`<${ThemeContext.Provider} value=${themeValue}><${PasswordSetupScreen} onComplete=${handleSetup} /></${ThemeContext.Provider}>`;
      if (authState === 'locked') return html`<${ThemeContext.Provider} value=${themeValue}><${PasswordLockScreen} onUnlock=${handleUnlock} onWipe=${wipeAll} /></${ThemeContext.Provider}>`;
      if (!data) return null;

      const { vision, milestones, checkins } = data;
      const sortedCheckins = [...checkins].sort((a, b) => b.createdAt - a.createdAt);
      const latestCheckin = sortedCheckins[0];
      const recent = sortedCheckins.slice(0, 6);
      const trajScore = recent.length === 0 ? null :
        recent.reduce((s, c) => s + (c.trajectory === 'on' ? 1 : c.trajectory === 'off' ? -1 : 0), 0) / recent.length;

      return html`
        <${ThemeContext.Provider} value=${themeValue}>
        <div class="app-root">
          <div class="header">
            <div>
              <div class="header-eyebrow">
                <div class="header-dot"></div>
                <p class="header-label">Five Year Horizon</p>
              </div>
              <h1 class="header-title">
                ${vision.startYear} <span class="header-arrow">→</span> ${vision.targetYear}
              </h1>
            </div>
            <button class="icon-btn" onClick=${() => setModal('settings')}>
              <${Icon} name="settings" size=${16} />
            </button>
          </div>

          ${tab === 'home' && html`<${HomeView}
            vision=${vision}
            milestones=${milestones}
            latestCheckin=${latestCheckin}
            trajScore=${trajScore}
            checkinCount=${checkins.length}
            onEditVision=${() => setModal('vision')}
            onAddCheckin=${() => setModal('checkin')}
            onGotoPlan=${() => setTab('plan')}
            onGotoHistory=${() => setTab('history')}
          />`}

          ${tab === 'plan' && html`<${PlanView}
            vision=${vision}
            milestones=${milestones}
            onEditVision=${() => setModal('vision')}
            onAddMilestone=${() => setModal('milestone')}
            onToggleMilestone=${(id) => updateData({ ...data, milestones: milestones.map(m => m.id === id ? {...m, done: !m.done} : m) })}
            onDeleteMilestone=${(id) => updateData({ ...data, milestones: milestones.filter(m => m.id !== id) })}
          />`}

          ${tab === 'history' && html`<${HistoryView}
            checkins=${sortedCheckins}
            onView=${(id) => { setViewingId(id); setModal('viewCheckin'); }}
            onAddCheckin=${() => setModal('checkin')}
          />`}

          <nav class="bottom-nav">
            <${NavBtn} icon="home" label="Home" active=${tab === 'home'} onClick=${() => setTab('home')} />
            <${NavBtn} icon="target" label="Plan" active=${tab === 'plan'} onClick=${() => setTab('plan')} />
            <${NavBtn} icon="book" label="History" active=${tab === 'history'} onClick=${() => setTab('history')} />
          </nav>

          ${modal === 'vision' && html`<${VisionModal}
            vision=${vision}
            onClose=${() => setModal(null)}
            onSave=${(v) => { updateData({ ...data, vision: v }); setModal(null); }}
          />`}
          ${modal === 'milestone' && html`<${MilestoneModal}
            vision=${vision}
            onClose=${() => setModal(null)}
            onSave=${(m) => { updateData({ ...data, milestones: [...milestones, { id: Date.now().toString(), done: false, ...m }] }); setModal(null); }}
          />`}
          ${modal === 'checkin' && html`<${CheckinModal}
            onClose=${() => setModal(null)}
            onSave=${(c) => { updateData({ ...data, checkins: [...checkins, { id: Date.now().toString(), createdAt: Date.now(), ...c }] }); setModal(null); }}
          />`}
          ${modal === 'viewCheckin' && viewingId && html`<${ViewCheckinModal}
            checkin=${checkins.find(c => c.id === viewingId)}
            onClose=${() => { setModal(null); setViewingId(null); }}
            onDelete=${() => { updateData({ ...data, checkins: checkins.filter(c => c.id !== viewingId) }); setModal(null); setViewingId(null); }}
          />`}
          ${modal === 'settings' && html`<${SettingsModal}
            data=${data}
            themePref=${themePref}
            onThemeChange=${updateTheme}
            onClose=${() => setModal(null)}
            onImport=${(d) => { updateData(d); setModal(null); }}
            onChangePassword=${handleChangePassword}
          />`}
        </div>
        </${ThemeContext.Provider}>
      `;
    }

    // ----- Password Screens -----
    function PasswordSetupScreen({ onComplete }) {
      const { palette: p } = useTheme();
      const [password, setPassword] = useState('');
      const [confirm, setConfirm] = useState('');
      const [show, setShow] = useState(false);
      const [error, setError] = useState('');
      const [busy, setBusy] = useState(false);

      const submit = async (e) => {
        if (e) e.preventDefault();
        setError('');
        if (password.length < 6) { setError('Password must be at least 6 characters'); return; }
        if (password !== confirm) { setError("Passwords don't match"); return; }
        setBusy(true);
        try {
          await onComplete(password);
        } catch (err) {
          console.error(err);
          setError('Something went wrong. Try again.');
          setBusy(false);
        }
      };

      return html`
        <div class="pin-screen">
          <div class="header-eyebrow" style=${{ justifyContent: 'center', marginBottom: '16px' }}>
            <${Icon} name="lock" size=${14} color=${p.accent} />
            <p class="header-label">Horizon</p>
          </div>
          <h1 class="pin-heading">Create a password</h1>
          <p class="pin-sub">Your data is encrypted with this password. If forgotten, it cannot be recovered.</p>
          <form onSubmit=${submit} style=${{ width: '100%', maxWidth: '360px' }}>
            <input type="text" name="username" autocomplete="username" value="horizon-user" style=${{ display: 'none' }} readonly />
            <div class="space-y-3">
              <input
                class="form-input"
                type=${show ? 'text' : 'password'}
                value=${password}
                onInput=${(e) => setPassword(e.target.value)}
                placeholder="New password (6+ characters)"
                autocomplete="new-password"
                autofocus
              />
              <input
                class="form-input"
                type=${show ? 'text' : 'password'}
                value=${confirm}
                onInput=${(e) => setConfirm(e.target.value)}
                placeholder="Confirm password"
                autocomplete="new-password"
              />
              <label style=${{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px', color: p.textMuted, padding: '4px 0' }}>
                <input type="checkbox" checked=${show} onChange=${(e) => setShow(e.target.checked)} />
                Show password
              </label>
              ${error && html`<p style=${{ color: p.negative, fontSize: '13px', textAlign: 'center', margin: '0' }}>${error}</p>`}
              <button type="submit" class="btn-primary" disabled=${busy}>
                ${busy ? 'Encrypting…' : 'Create password'}
              </button>
            </div>
          </form>
        </div>
      `;
    }

    function PasswordLockScreen({ onUnlock, onWipe }) {
      const { palette: p } = useTheme();
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [busy, setBusy] = useState(false);
      const [show, setShow] = useState(false);
      const [confirmWipe, setConfirmWipe] = useState(false);

      const submit = async (e) => {
        if (e) e.preventDefault();
        if (busy || !password) return;
        setError('');
        setBusy(true);
        const ok = await onUnlock(password);
        if (!ok) {
          setError('Wrong password');
          setPassword('');
          setBusy(false);
        }
      };

      if (confirmWipe) {
        return html`
          <div class="pin-screen">
            <h1 class="pin-heading" style=${{ color: p.negative }}>Reset everything?</h1>
            <p class="pin-sub">This will delete your password and all your plan data. There is no way to recover it.</p>
            <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', width: '100%', maxWidth: '320px' }}>
              <button class="btn-primary" style=${{ background: p.surface2, color: p.text }} onClick=${() => setConfirmWipe(false)}>Cancel</button>
              <button class="btn-primary" style=${{ background: p.negative, color: '#fff' }} onClick=${onWipe}>Delete all</button>
            </div>
          </div>
        `;
      }

      return html`
        <div class="pin-screen">
          <div class="header-eyebrow" style=${{ justifyContent: 'center', marginBottom: '16px' }}>
            <${Icon} name="lock" size=${14} color=${p.accent} />
            <p class="header-label">Horizon</p>
          </div>
          <h1 class="pin-heading">Welcome back</h1>
          <p class="pin-sub">Enter your password to unlock</p>
          <form onSubmit=${submit} style=${{ width: '100%', maxWidth: '360px' }}>
            <input type="text" name="username" autocomplete="username" value="horizon-user" style=${{ display: 'none' }} readonly />
            <div class="space-y-3">
              <input
                class="form-input"
                type=${show ? 'text' : 'password'}
                value=${password}
                onInput=${(e) => setPassword(e.target.value)}
                placeholder="Password"
                autocomplete="current-password"
                autofocus
              />
              <label style=${{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px', color: p.textMuted, padding: '4px 0' }}>
                <input type="checkbox" checked=${show} onChange=${(e) => setShow(e.target.checked)} />
                Show password
              </label>
              ${error && html`<p style=${{ color: p.negative, fontSize: '13px', textAlign: 'center', margin: '0' }}>${error}</p>`}
              <button type="submit" class="btn-primary" disabled=${busy || !password}>
                ${busy ? 'Decrypting…' : 'Unlock'}
              </button>
            </div>
          </form>
          <div class="pin-footer">
            <button onClick=${() => setConfirmWipe(true)}>Forgot password?</button>
          </div>
        </div>
      `;
    }

    // ----- Nav -----
    function NavBtn({ icon, label, active, onClick }) {
      return html`
        <button class="nav-btn ${active ? 'active' : ''}" onClick=${onClick}>
          <${Icon} name=${icon} size=${20} strokeWidth=${active ? 2.2 : 1.7} />
          <span class="nav-btn-label">${label}</span>
        </button>
      `;
    }

    // ----- Home View -----
    function HomeView({ vision, milestones, latestCheckin, trajScore, checkinCount, onEditVision, onAddCheckin, onGotoPlan, onGotoHistory }) {
      const { palette: p, resolved } = useTheme();
      const completed = milestones.filter(m => m.done).length;
      const editIconColor = resolved === 'dark' ? 'rgba(26,24,20,0.5)' : 'rgba(242,237,225,0.5)';

      return html`
        <div class="container space-y-5">
          <button class="vision-card grain" onClick=${onEditVision}>
            <div class="vision-card-header">
              <div class="vision-card-badge">
                <${Icon} name="sparkles" size=${14} color=${p.visionAccent} />
                <span>The Vision</span>
              </div>
              <${Icon} name="edit" size=${14} color=${editIconColor} />
            </div>
            ${vision.text
              ? html`<p class="vision-text">${vision.text}</p>`
              : html`<p class="vision-text vision-placeholder">Tap to write where you want to be in ${vision.targetYear}…</p>`
            }
          </button>

          <div class="card">
            <div class="card-header">

    function TrajectoryDisplay({ score }) {
      const { palette: p } = useTheme();
      if (score === null) {
        return html`
          <div class="traj-row">
            <div class="traj-circle" style=${{ background: p.surface2 }}>
              <${Icon} name="minus" size=${20} color=${p.textMuted} />
            </div>
            <div>
              <p class="traj-label">No data yet</p>
              <p class="traj-sublabel">Add a check-in to start tracking</p>
            </div>
          </div>
        `;
      }

      let label, sub, color, bg, iconName;
      if (score > 0.33) { label = 'Moving toward it'; sub = 'Keep the momentum going'; color = p.positive; bg = p.positiveBg; iconName = 'trendUp'; }
      else if (score < -0.33) { label = 'Drifting off course'; sub = 'Time for a course correction'; color = p.negative; bg = p.negativeBg; iconName = 'trendDown'; }
      else { label = 'Holding steady'; sub = 'Mixed signals — watch closely'; color = p.neutral; bg = p.neutralBg; iconName = 'minus'; }

      return html`
        <div class="traj-row">
          <div class="traj-circle" style=${{ background: bg }}>
            <${Icon} name=${iconName} size=${20} color=${color} />
          </div>
          <div>
            <p class="traj-label" style=${{ color }}>${label}</p>
            <p class="traj-sublabel">${sub}</p>
          </div>
        </div>
      `;
    }

    function TrajectoryDot({ trajectory }) {
      const { palette: p } = useTheme();
      const map = {
        on: { bg: p.positiveBg, color: p.positive, icon: 'trendUp' },
        off: { bg: p.negativeBg, color: p.negative, icon: 'trendDown' },
        neutral: { bg: p.neutralBg, color: p.neutral, icon: 'minus' }
      };
      const c = map[trajectory] || { bg: p.surface2, color: p.textMuted, icon: 'minus' };
      return html`
        <div class="traj-dot-circle" style=${{ background: c.bg }}>
          <${Icon} name=${c.icon} size=${16} color=${c.color} />
        </div>
      `;
    }

    // ----- Plan View -----
    function PlanView({ vision, milestones, onEditVision, onAddMilestone, onToggleMilestone, onDeleteMilestone }) {
      const { palette: p } = useTheme();
      const sorted = [...milestones].sort((a, b) => a.year - b.year);
      const byYear = {};
      sorted.forEach(m => { if (!byYear[m.year]) byYear[m.year] = []; byYear[m.year].push(m); });
      const years = Object.keys(byYear).map(Number).sort();

      return html`
        <div class="container space-y-5">
          <button class="card" style=${{ textAlign: 'left', width: '100%' }} onClick=${onEditVision}>
            <div class="card-header">
              <span class="card-label">By ${vision.targetYear}</span>
              <${Icon} name="edit" size=${14} color=${p.textMuted} />
            </div>
            ${vision.text
              ? html`<p class="vision-text" style=${{ fontSize: '18px', color: p.text }}>${vision.text}</p>`
              : html`<p class="vision-text vision-placeholder" style=${{ fontSize: '18px' }}>Define your vision…</p>`
            }
          </button>

          <div>
            <div class="section-header">
              <h2 class="section-title">Milestones</h2>
              <button class="add-btn" onClick=${onAddMilestone}>
                <${Icon} name="plus" size=${16} color=${p.accentFg} />
              </button>
            </div>

            ${milestones.length === 0 ? html`
              <div class="empty">
                <div class="empty-icon"><${Icon} name="target" size=${24} color=${p.textMuted} /></div>
                <p class="empty-title">No milestones yet</p>
                <p class="empty-sub">Break your vision into year-by-year goals</p>
              </div>
            ` : html`
              <div class="space-y-5">
                ${years.map(year => html`
                  <div>
                    <div class="year-header">
                      <div class="year-dot"></div>
                      <span class="year-label">${year}</span>
                      <div class="year-line"></div>
                    </div>
                    <div>
                      ${byYear[year].map(m => html`
                        <div class="milestone-row" key=${m.id}>
                          <button class="ms-checkbox" onClick=${() => onToggleMilestone(m.id)}>
                            ${m.done
                              ? html`<div class="ms-checkbox-filled"><${Icon} name="checkMark" size=${12} color="#FFFFFF" /></div>`
                              : html`<div class="ms-checkbox-empty"></div>`
                            }
                          </button>
                          <p class="ms-text ${m.done ? 'done' : ''}">${m.text}</p>
                          <button class="ms-delete" onClick=${() => onDeleteMilestone(m.id)}>
                            <${Icon} name="trash" size=${14} />
                          </button>
                        </div>
                      `)}
                    </div>
                  </div>
                `)}
              </div>
            `}
          </div>
        </div>
      `;

    // ----- Check-in modal -----

      const trajOptions = [
        { key: 'on', label: 'On track', color: p.positive, bg: p.positiveBg, icon: 'trendUp' },
        { key: 'neutral', label: 'Mixed', color: p.neutral, bg: p.neutralBg, icon: 'minus' },
        { key: 'off', label: 'Off track', color: p.negative, bg: p.negativeBg, icon: 'trendDown' }
      ];

      return html`
        <${Modal} title="${MONTHS[month]} check-in" subtitle="How's it going toward your vision?" onClose=${onClose}>
          <div class="space-y-5">
            <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>

              <input class="form-input" type="number" value=${year} onInput=${(e) => setYear(parseInt(e.target.value) || year)} />
            </div>

            <div>
              <label class="form-label">Trajectory this month</label>

                ${trajOptions.map(opt => {

                      onClick=${() => setTrajectory(opt.key)}
                    >
                      <${Icon} name=${opt.icon} size=${16} color=${opt.color} />

            <${ListEditor} label="Next month's actions" placeholder="What will move you forward…" items=${nextActions} setItems=${setNextActions} accentColor=${p.accent} accentBg=${p.accentSoftBg} iconName="arrowRight" />

                style=${{ padding: '12px', fontSize: '14px' }}
                value=${reflection}

                rows=${3}
                placeholder="Looking back, what stood out this month?"
              ></textarea>

            <button class="btn-primary" onClick=${() => onSave({ month, year, trajectory, positives, negatives, nextActions, reflection: reflection.trim() })}>
              Save check-in

    // ----- List editor -----
    function ListEditor({ label, placeholder, items, setItems, accentColor, accentBg, iconName }) {
      const [draft, setDraft] = useState('');
      const add = () => { if (draft.trim()) { setItems([...items, draft.trim()]); setDraft(''); } };

      return html`
        <div>
          <label class="display-list-label" style=${{ color: accentColor }}>
            <${Icon} name=${iconName} size=${12} color=${accentColor} />
            ${label}
          </label>
          <div>
            ${items.map((item, i) => html`
              <div class="list-item" style=${{ background: accentBg }} key=${i}>
                <span class="list-item-text">${item}</span>
                <button class="list-item-remove" onClick=${() => setItems(items.filter((_, j) => j !== i))}>
                  <${Icon} name="x" size=${14} />
                </button>
              </div>
            `)}
          </div>
          <div class="list-add-row">
            <input
              class="list-add-input"
              value=${draft}
              onInput=${(e) => setDraft(e.target.value)}
              onKeyDown=${(e) => { if (e.key === 'Enter') { e.preventDefault(); add(); } }}

            </button>
          </div>
        </div>
      `;
    }

    // ----- Settings modal -----
    function SettingsModal({ data, themePref, onThemeChange, onClose, onImport, onChangePassword }) {
      const { palette: p } = useTheme();
      const [mode, setMode] = useState('menu');
      const [importText, setImportText] = useState('');
      const [importError, setImportError] = useState('');
      const [copied, setCopied] = useState(false);

      // Change password state
      const [curPw, setCurPw] = useState('');
      const [newPw, setNewPw] = useState('');
      const [confirmPw, setConfirmPw] = useState('');
      const [pwError, setPwError] = useState('');
      const [pwBusy, setPwBusy] = useState(false);
      const [pwSuccess, setPwSuccess] = useState(false);

      const exportJson = JSON.stringify(data, null, 2);

      const handleCopy = async () => {
        try {
          await navigator.clipboard.writeText(exportJson);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch {
          const ta = document.getElementById('export-ta');
          if (ta) { ta.select(); try { document.execCommand('copy'); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {} }
        }
      };

      const handleDownload = () => {
        const blob = new Blob([exportJson], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `horizon-backup-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const handleImport = () => {
        setImportError('');
        try {
          const parsed = JSON.parse(importText);
          if (!parsed.vision || !Array.isArray(parsed.milestones) || !Array.isArray(parsed.checkins)) {
            throw new Error('Invalid format');
          }
          onImport(parsed);
        } catch {
          setImportError("That doesn't look like valid plan data.");
        }
      };

      const handlePasswordChange = async (e) => {
        if (e) e.preventDefault();
        setPwError('');
        if (newPw.length < 6) { setPwError('New password must be 6+ characters'); return; }
        if (newPw !== confirmPw) { setPwError("New passwords don't match"); return; }
        if (newPw === curPw) { setPwError('New password must be different from current'); return; }
        setPwBusy(true);
        try {
          const result = await onChangePassword(curPw, newPw);
          if (result === 'WRONG_CURRENT') {
            setPwError('Current password is wrong');
            setPwBusy(false);
          } else {
            setPwSuccess(true);
            setCurPw(''); setNewPw(''); setConfirmPw('');
            setTimeout(() => { setPwSuccess(false); setMode('menu'); }, 1200);
          }
        } catch {
          setPwError('Something went wrong');
          setPwBusy(false);
        }
      };

      const title = mode === 'menu' ? 'Settings'
        : mode === 'export' ? 'Export data'
        : mode === 'import' ? 'Import data'
        : mode === 'appearance' ? 'Appearance'
        : 'Change password';
      const sub = mode === 'menu' ? 'Appearance, backups, and password'
        : mode === 'export' ? 'Copy or download to save somewhere safe'
        : mode === 'import' ? 'Paste your exported JSON below'
        : mode === 'appearance' ? 'Choose how Horizon looks'
        : 'Your data will be re-encrypted with the new password';

      const themeOptions = [
        { key: 'light', label: 'Light', icon: 'sun' },
        { key: 'dark', label: 'Dark', icon: 'moon' },
        { key: 'system', label: 'System', icon: 'monitor' }
      ];

      return html`
        <${Modal} title=${title} subtitle=${sub} onClose=${onClose}>
          ${mode === 'menu' && html`
            <div class="space-y-3">
              <button class="card" style=${{ textAlign: 'left', width: '100%', display: 'flex', alignItems: 'center', gap: '12px', padding: '16px' }} onClick=${() => setMode('appearance')}>
                <div style=${{ width: '40px', height: '40px', borderRadius: '50%', background: p.accentSoftBg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <${Icon} name="palette" size=${16} color=${p.accent} />
                </div>
                <div style=${{ flex: 1 }}>
                  <p style=${{ fontFamily: 'Fraunces, serif', fontSize: '16px', fontWeight: 500, margin: 0, color: p.text }}>Appearance</p>
                  <p style=${{ fontSize: '12px', color: p.textMuted, margin: '2px 0 0' }}>
                    ${themePref === 'system' ? 'Match system' : themePref === 'dark' ? 'Dark mode' : 'Light mode'}
                  </p>
                </div>
                <${Icon} name="chevron" size=${16} color=${p.textMuted} />
              </button>
              <button class="card" style=${{ textAlign: 'left', width: '100%', display: 'flex', alignItems: 'center', gap: '12px', padding: '16px' }} onClick=${() => setMode('export')}>
                <div style=${{ width: '40px', height: '40px', borderRadius: '50%', background: p.positiveBg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <${Icon} name="download" size=${16} color=${p.positive} />
                </div>
                <div>
                  <p style=${{ fontFamily: 'Fraunces, serif', fontSize: '16px', fontWeight: 500, margin: 0, color: p.text }}>Export my data</p>
                  <p style=${{ fontSize: '12px', color: p.textMuted, margin: '2px 0 0' }}>Back up everything as JSON</p>
                </div>
              </button>
              <button class="card" style=${{ textAlign: 'left', width: '100%', display: 'flex', alignItems: 'center', gap: '12px', padding: '16px' }} onClick=${() => setMode('import')}>
                <div style=${{ width: '40px', height: '40px', borderRadius: '50%', background: p.accentSoftBg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <${Icon} name="upload" size=${16} color=${p.accent} />
                </div>
                <div>
                  <p style=${{ fontFamily: 'Fraunces, serif', fontSize: '16px', fontWeight: 500, margin: 0, color: p.text }}>Import data</p>
                  <p style=${{ fontSize: '12px', color: p.textMuted, margin: '2px 0 0' }}>Restore from a backup (replaces current)</p>
                </div>
              </button>
              <button class="card" style=${{ textAlign: 'left', width: '100%', display: 'flex', alignItems: 'center', gap: '12px', padding: '16px' }} onClick=${() => setMode('changepw')}>
                <div style=${{ width: '40px', height: '40px', borderRadius: '50%', background: p.surface2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <${Icon} name="lock" size=${16} color=${p.text} />
                </div>
                <div>
                  <p style=${{ fontFamily: 'Fraunces, serif', fontSize: '16px', fontWeight: 500, margin: 0, color: p.text }}>Change password</p>
                  <p style=${{ fontSize: '12px', color: p.textMuted, margin: '2px 0 0' }}>Update your encryption password</p>
                </div>
              </button>
              <div style=${{ paddingTop: '8px', textAlign: 'center', fontSize: '12px', color: p.textMuted }}>
                ${data.checkins.length} check-ins · ${data.milestones.length} milestones
              </div>
              <div style=${{ textAlign: 'center', fontSize: '11px', color: p.textMuted, paddingTop: '4px' }}>
                🔒 AES-256 encrypted · stored only on this device
              </div>
            </div>
          `}

          ${mode === 'appearance' && html`
            <div class="space-y-4">
              <div class="theme-picker">
                ${themeOptions.map(opt => {
                  const selected = themePref === opt.key;
                  return html`
                    <button
                      class="theme-option ${selected ? 'selected' : ''}"
                      onClick=${() => onThemeChange(opt.key)}
                    >
                      <${Icon} name=${opt.icon} size=${20} color=${selected ? p.accent : p.text} />
                      <span class="theme-option-label" style=${{ color: selected ? p.accent : p.text }}>${opt.label}</span>
                    </button>
                  `;
                })}
              </div>
              <p style=${{ textAlign: 'center', fontSize: '12px', color: p.textMuted, margin: 0 }}>
                ${themePref === 'system' ? 'Follows your device appearance setting.' : 'Your selection is saved with your data.'}
              </p>
              <button class="btn-text" onClick=${() => setMode('menu')}>← Back</button>
            </div>
          `}

          ${mode === 'export' && html`
            <div class="space-y-3">
              <textarea id="export-ta" class="form-textarea mono" readonly value=${exportJson} rows=${10} style=${{ padding: '12px' }}></textarea>
              <div style=${{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                <button class="btn-primary" onClick=${handleCopy}>
                  ${copied ? '✓ Copied!' : 'Copy'}
                </button>
                <button class="btn-primary" style=${{ background: p.accent, color: '#fff' }} onClick=${handleDownload}>
                  Download file
                </button>
              </div>
              <p style=${{ textAlign: 'center', fontSize: '11px', color: p.textMuted, margin: 0 }}>
                This export is plain JSON — store it somewhere private.
              </p>
              <button class="btn-text" onClick=${() => setMode('menu')}>← Back</button>
            </div>
          `}

          ${mode === 'import' && html`
            <div class="space-y-3">
              <textarea class="form-textarea mono" value=${importText} onInput=${(e) => { setImportText(e.target.value); setImportError(''); }} rows=${10} placeholder="Paste your exported JSON here…" style=${{ padding: '12px' }}></textarea>
              ${importError && html`<p style=${{ textAlign: 'center', fontSize: '12px', color: p.negative }}>${importError}</p>`}
              <button class="btn-accent" disabled=${!importText.trim()} onClick=${handleImport}>
                Replace my data with this
              </button>
              <button class="btn-text" onClick=${() => setMode('menu')}>← Back</button>
            </div>
          `}

          ${mode === 'changepw' && html`
            <form onSubmit=${handlePasswordChange}>
              <div class="space-y-3">
                <input type="text" name="username" autocomplete="username" value="horizon-user" style=${{ display: 'none' }} readonly />
                <input
                  class="form-input"
                  type="password"
                  value=${curPw}
                  onInput=${(e) => setCurPw(e.target.value)}
                  placeholder="Current password"
                  autocomplete="current-password"
                  autofocus
                />
                <input
                  class="form-input"
                  type="password"
                  value=${newPw}
                  onInput=${(e) => setNewPw(e.target.value)}
                  placeholder="New password (6+ characters)"
                  autocomplete="new-password"
                />
                <input
                  class="form-input"
                  type="password"
                  value=${confirmPw}
                  onInput=${(e) => setConfirmPw(e.target.value)}
                  placeholder="Confirm new password"
                  autocomplete="new-password"
                />
                ${pwError && html`<p style=${{ textAlign: 'center', fontSize: '13px', color: p.negative, margin: 0 }}>${pwError}</p>`}
                ${pwSuccess && html`<p style=${{ textAlign: 'center', fontSize: '13px', color: p.positive, margin: 0 }}>✓ Password changed</p>`}
                <button type="submit" class="btn-primary" disabled=${pwBusy || pwSuccess}>
                  ${pwBusy ? 'Re-encrypting…' : pwSuccess ? 'Done' : 'Change password'}
                </button>
                <button type="button" class="btn-text" onClick=${() => { setMode('menu'); setCurPw(''); setNewPw(''); setConfirmPw(''); setPwError(''); }}>← Back</button>
              </div>
            </form>
          `}
        </${Modal}>
      `;
    }

    // ----- Render -----
    render(h(App), document.getElementById('app'));
  })();
  </script>
</body>
</html>
